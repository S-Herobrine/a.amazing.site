<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Game Hub 😎</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* Header */
.header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  background: #111;
  box-shadow: 0 2px 10px #000;
}

/* Search bar */
.search {
  text-align: center;
  margin: 20px;
}

.search input {
  width: 60%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Cards */
.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px #000;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 20px #00ffcc;
}

/* Thumbnail */
.thumb {
  height: 120px;
  background: linear-gradient(45deg, #00ffcc, #0066ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* Title */
.title {
  padding: 10px;
  text-align: center;
}

/* Buttons */
.controls {
  text-align: center;
  margin: 20px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #00ffcc;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  background: #00ccaa;
}
</style>

</head>

<body>

<div class="header">🔥 My Game Hub 🔥</div>

<div class="search">
  <input type="text" id="search" placeholder="Search games..." onkeyup="searchGame()">
</div>

<div class="controls">
  <button onclick="randomGame()">🎲 Random Game</button>
</div>

<div class="grid" id="gameGrid">

  <div class="card" data-name="useless text" onclick="go('useless-text/')">
    <div class="thumb">😎</div>
    <div class="title">Useless Text</div>
  </div>

 <div class="card" data-name="flappy you" onclick="go('flappy-you/')">
  <div class="thumb">🐤</div>
  <div class="title">Flappy You</div>
</div>

</div>

<script>

// Navigate
function go(path) {
  window.location.href = path;
}

// Random game
function randomGame() {
  let cards = document.querySelectorAll(".card");
  let r = cards[Math.floor(Math.random() * cards.length)];
  r.click();
}

// Search
function searchGame() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.getAttribute("data-name");
    card.style.display = name.includes(input) ? "block" : "none";
  });
}

</script>

</body>
</html>
