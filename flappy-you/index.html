<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy You</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    overflow:hidden;
    background:#70c5ce;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
    z-index:10;
}

#menu, #gameOver{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.4);
    color:white;
    z-index:20;
}

button{
    padding:10px 20px;
    margin:5px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">Score: 0</div>

<div id="menu">
    <h1>Flappy You</h1>
    <button onclick="startGame()">Start</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>Game Over 💀</h1>
    <button onclick="restart()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird, pipes, score, gravity, lift, pipeGap, pipeSpeed, frame;
let gameRunning = false;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    setMode();
}

function setMode(){

    // PC / Landscape / Mobile detect
    if(canvas.width > canvas.height){
        // PC MODE 😎
        pipeGap = canvas.height * 0.35;
        pipeSpeed = 3;
        gravity = 0.5;
        lift = -10;
        birdSize = 50;
    } else {
        // MOBILE MODE 📱
        pipeGap = canvas.height * 0.3;
        pipeSpeed = 2;
        gravity = 0.6;
        lift = -9;
        birdSize = 40;
    }

    bird = {
        x: canvas.width / 4,
        y: canvas.height / 2,
        w: birdSize,
        h: birdSize,
        velocity: 0
    };

    pipes = [];
    score = 0;
    frame = 0;

    document.getElementById("ui").innerText = "Score: 0";
}

function drawBird(){
    ctx.fillStyle = "yellow";
    ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
}

function updateBird(){
    bird.velocity += gravity;
    bird.y += bird.velocity;

    if(bird.y + bird.h > canvas.height){
        gameOver();
    }
    if(bird.y < 0){
        bird.y = 0;
        bird.velocity = 0;
    }
}

function spawnPipe(){
    let margin = 60;
    let top = Math.random() * (canvas.height - pipeGap - margin*2) + margin;

    pipes.push({
        x: canvas.width,
        top: top,
        bottom: top + pipeGap,
        passed:false
    });
}

function drawPipes(){
    ctx.fillStyle = "green";

    pipes.forEach(p => {
        ctx.fillRect(p.x, 0, 80, p.top);
        ctx.fillRect(p.x, p.bottom, 80, canvas.height - p.bottom);
    });
}

function updatePipes(){
    pipes.forEach(p => {
        p.x -= pipeSpeed;

        // score
        if(!p.passed && p.x + 80 < bird.x){
            score++;
            p.passed = true;
            document.getElementById("ui").innerText = "Score: " + score;
        }

        // collision
        if(
            bird.x < p.x + 80 &&
            bird.x + bird.w > p.x &&
            (bird.y < p.top || bird.y + bird.h > p.bottom)
        ){
            gameOver();
        }
    });

    pipes = pipes.filter(p => p.x > -100);
}

function loop(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    updateBird();
    drawBird();

    if(frame % 100 === 0){
        spawnPipe();
    }

    updatePipes();
    drawPipes();

    frame++;
    requestAnimationFrame(loop);
}

function startGame(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameOver").style.display = "none";
    gameRunning = true;
    resize();
    loop();
}

function gameOver(){
    gameRunning = false;
    document.getElementById("gameOver").style.display = "flex";
}

function restart(){
    startGame();
}

window.addEventListener("resize", resize);

window.addEventListener("keydown", e=>{
    if(e.code === "Space"){
        bird.velocity = lift;
    }
});

window.addEventListener("click", ()=>{
    if(gameRunning){
        bird.velocity = lift;
    }
});

resize();
</script>

</body>
</html>
