<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy You 😎</title>

<style>
body {
  margin: 0;
  background: skyblue;
  overflow: hidden;
  font-family: Arial;
}

canvas {
  display: block;
}

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 20px;
}

button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
}
</style>

</head>
<body>

<div id="menu">
  <h2>Upload Your Image 😎</h2>
  <input type="file" id="imgUpload"><br><br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="ui" style="display:none;">
  Score: <span id="score">0</span><br>
  <button onclick="pauseGame()">Pause</button>
  <button onclick="resumeGame()">Resume</button>
  <button onclick="restartGame()">Restart</button>
  <button onclick="quitGame()">Quit</button>
</div>

<canvas id="game"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird = { x: 100, y: 200, vy: 0 };
let gravity = 0.5;
let pipes = [];
let score = 0;
let gameRunning = false;
let img = new Image();

function startGame() {
  let file = document.getElementById("imgUpload").files[0];
  if (!file) return alert("Upload image first!");

  img.src = URL.createObjectURL(file);

  document.getElementById("menu").style.display = "none";
  document.getElementById("ui").style.display = "block";

  resetGame();
  gameRunning = true;
  loop();
}

function resetGame() {
  bird.y = 200;
  bird.vy = 0;
  pipes = [];
  score = 0;
}

function loop() {
  if (!gameRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Bird physics
  bird.vy += gravity;
  bird.y += bird.vy;

  // Draw bird
  ctx.drawImage(img, bird.x, bird.y, 40, 40);

  // Pipes
  if (Math.random() < 0.02) {
    let gap = 150;
    let top = Math.random() * (canvas.height - gap);
    pipes.push({ x: canvas.width, top });
  }

  pipes.forEach((p, i) => {
    p.x -= 3;

    // Draw pipes
    ctx.fillStyle = "green";
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, p.top + 150, 50, canvas.height);

    // Collision
    if (
      bird.x < p.x + 50 &&
      bird.x + 40 > p.x &&
      (bird.y < p.top || bird.y + 40 > p.top + 150)
    ) {
      gameOver();
    }

    // Score
    if (p.x === bird.x) {
      score++;
      document.getElementById("score").innerText = score;
    }
  });

  // Ground / ceiling
  if (bird.y > canvas.height || bird.y < 0) {
    gameOver();
  }

  requestAnimationFrame(loop);
}

// Controls
window.addEventListener("click", () => {
  bird.vy = -8;
});

window.addEventListener("touchstart", () => {
  bird.vy = -8;
});

// Buttons
function pauseGame() {
  gameRunning = false;
}

function resumeGame() {
  if (!gameRunning) {
    gameRunning = true;
    loop();
  }
}

function restartGame() {
  resetGame();
  gameRunning = true;
  loop();
}

function quitGame() {
  location.href = "/";
}

function gameOver() {
  gameRunning = false;
  alert("Game Over! Score: " + score);
}
</script>

</body>
</html>
