<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy GO 😎</title>

<style>
body {
    margin: 0;
    background: #70c5ce;
    font-family: Arial;
    text-align: center;
}

canvas {
    display: none;
    margin: auto;
    background: #70c5ce;
}

#menu, #gameOver {
    position: absolute;
    width: 100%;
    top: 40%;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 5px;
    cursor: pointer;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 24px;
    color: white;
}
</style>
</head>

<body>

<div id="menu">
    <h1>Flappy GO 😎</h1>
    <input type="file" id="upload"><br><br>
    <button onclick="startGame()">Start</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>Game Over 💀</h1>
    <button onclick="restartGame()">Restart</button>
    <button onclick="quitGame()">Quit</button>
</div>

<div id="score">0</div>

<canvas id="gameCanvas"></canvas>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let birdImg = new Image();

let bird = { x: 80, y: 200, w: 50, h: 50, velocity: 0 };

let gravity = 0.5;
let jump = -8;

let pipes = [];
let pipeGap, pipeWidth = 60, pipeSpeed;
let spawnTimer = 0, spawnInterval;

let score = 0;
let gameRunning = false;

// 📱💻 RESPONSIVE CANVAS
function resizeCanvas() {
    if (window.innerWidth > 700) {
        canvas.width = 900;
        canvas.height = 500;
    } else {
        canvas.width = 400;
        canvas.height = 600;
    }
}

// 🎮 GAME MODE SETTINGS
function setGameMode() {
    if (canvas.width > canvas.height) {
        pipeGap = 180;
        spawnInterval = 140;
        pipeSpeed = 3;
        bird.w = 60;
        bird.h = 60;
    } else {
        pipeGap = 150;
        spawnInterval = 110;
        pipeSpeed = 2;
        bird.w = 50;
        bird.h = 50;
    }
}

window.addEventListener("resize", () => {
    resizeCanvas();
    setGameMode();
});

// 📷 IMAGE UPLOAD
document.getElementById("upload").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = function(event){
        birdImg.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function startGame(){
    if(!birdImg.src){
        alert("Upload image first!");
        return;
    }

    resizeCanvas();
    setGameMode();

    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";

    resetGame();
    gameRunning = true;
    gameLoop();
}

function resetGame(){
    bird.y = canvas.height / 2;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    spawnTimer = 0;
}

// 🟩 PIPE SYSTEM (NO BUG)
function spawnPipe(){
    let top = Math.random() * (canvas.height - pipeGap - 100) + 50;

    pipes.push({
        x: canvas.width,
        top: top,
        bottom: top + pipeGap,
        passed: false
    });
}

function update(){
    bird.velocity += gravity;
    bird.y += bird.velocity;

    spawnTimer++;
    if(spawnTimer > spawnInterval){
        spawnPipe();
        spawnTimer = 0;
    }

    for(let i = pipes.length - 1; i >= 0; i--){
        let p = pipes[i];
        p.x -= pipeSpeed;

        if(!p.passed && p.x < bird.x){
            score++;
            p.passed = true;
        }

        if(p.x + pipeWidth < 0){
            pipes.splice(i, 1);
        }

        // COLLISION
        if(
            bird.x < p.x + pipeWidth &&
            bird.x + bird.w > p.x &&
            (bird.y < p.top || bird.y + bird.h > p.bottom)
        ){
            gameOver();
        }
    }

    if(bird.y < 0 || bird.y + bird.h > canvas.height){
        gameOver();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

    ctx.fillStyle = "green";
    pipes.forEach(p => {
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        ctx.fillRect(p.x, p.bottom, pipeWidth, canvas.height);
    });

    document.getElementById("score").innerText = score;
}

function gameLoop(){
    if(!gameRunning) return;

    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver(){
    gameRunning = false;
    document.getElementById("gameOver").style.display = "block";
}

function restartGame(){
    document.getElementById("gameOver").style.display = "none";
    resetGame();
    gameRunning = true;
    gameLoop();
}

function quitGame(){
    location.reload();
}

// 🎮 CONTROLS
function jumpAction(){
    bird.velocity = jump;
}

document.addEventListener("keydown", e=>{
    if(e.code === "Space") jumpAction();
});

document.addEventListener("click", jumpAction);
document.addEventListener("touchstart", jumpAction);
</script>

</body>
</html>
