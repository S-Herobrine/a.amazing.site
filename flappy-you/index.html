<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy You</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#70c5ce;font-family:Arial}

canvas{display:block}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
z-index:10;
}

#panel{
position:absolute;
top:10px;
right:10px;
z-index:10;
background:rgba(0,0,0,0.4);
padding:10px;
color:white;
border-radius:10px;
}

#menu,#over{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.5);
color:white;
z-index:20;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">Score: 0</div>

<div id="panel">
<h3>Upload Sprites</h3>
Bird: <input type="file" id="birdImg"><br><br>
Pipe: <input type="file" id="pipeImg">
</div>

<div id="menu">
<h1>FLAPPY YOU</h1>
<button onclick="start()">PLAY</button>
</div>

<div id="over" style="display:none">
<h1>GAME OVER 💀</h1>
<button onclick="restart()">RESTART</button>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const x = c.getContext("2d");

let birdImg = new Image();
let pipeImg = new Image();

let bird, pipes, score;
let gravity, lift, gap, speed;
let run = false;

function resize(){
c.width = window.innerWidth;
c.height = window.innerHeight;
mode();
}

function mode(){
let pc = c.width > c.height;

gravity = pc ? 0.5 : 0.6;
lift = pc ? -10 : -9;
gap = pc ? c.height*0.35 : c.height*0.28;
speed = pc ? 3 : 2;

bird = {
x: c.width/4,
y: c.height/2,
w: 50,
h: 50,
v:0
};

pipes = [];
score = 0;
document.getElementById("ui").innerText="Score: 0";
}

function drawBird(){
if(birdImg.src)
x.drawImage(birdImg,bird.x,bird.y,bird.w,bird.h);
else{
x.fillStyle="yellow";
x.fillRect(bird.x,bird.y,bird.w,bird.h);
}
}

function updateBird(){
bird.v += gravity;
bird.y += bird.v;

if(bird.y<0) bird.y=0;
if(bird.y+bird.h>c.height) gameOver();
}

function spawnPipe(){
let top = Math.random()*(c.height-gap-100)+50;

pipes.push({
x:c.width,
top:top,
passed:false
});
}

function drawPipes(){
pipes.forEach(p=>{
if(pipeImg.src){
x.drawImage(pipeImg,p.x,0,80,p.top);
x.drawImage(pipeImg,p.x,p.top+gap,80,c.height);
}else{
x.fillStyle="green";
x.fillRect(p.x,0,80,p.top);
x.fillRect(p.x,p.top+gap,80,c.height);
}
});
}

function updatePipes(){
pipes.forEach(p=>{
p.x -= speed;

if(!p.passed && p.x < bird.x){
score++;
p.passed=true;
document.getElementById("ui").innerText="Score: "+score;
}

if(
bird.x < p.x+80 &&
bird.x+bird.w > p.x &&
(bird.y < p.top || bird.y+bird.h > p.top+gap)
){
gameOver();
}
});

pipes = pipes.filter(p=>p.x>-100);
}

function loop(){
if(!run) return;

x.clearRect(0,0,c.width,c.height);

updateBird();
drawBird();

if(frame()%120===0) spawnPipe();

updatePipes();
drawPipes();

requestAnimationFrame(loop);
}

function frame(){
return Math.floor(performance.now()/10);
}

function start(){
document.getElementById("menu").style.display="none";
document.getElementById("over").style.display="none";
run=true;
resize();
loop();
}

function restart(){
start();
}

function gameOver(){
run=false;
document.getElementById("over").style.display="flex";
}

// upload bird
document.getElementById("birdImg").onchange=(e)=>{
birdImg.src = URL.createObjectURL(e.target.files[0]);
};

// upload pipe
document.getElementById("pipeImg").onchange=(e)=>{
pipeImg.src = URL.createObjectURL(e.target.files[0]);
};

window.addEventListener("resize",resize);

window.addEventListener("keydown",e=>{
if(e.code==="Space") bird.v = lift;
});

window.addEventListener("click",()=>{
if(run) bird.v = lift;
});

resize();
</script>

</body>
</html>
