<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy GO ULTRA 😎🔥</title>

<style>
body {
    margin: 0;
    background: #70c5ce;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

canvas {
    display: none;
    margin: auto;
    background: linear-gradient(#70c5ce, #ffffff);
}

#menu, #gameOver {
    position: absolute;
    width: 100%;
    top: 35%;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 5px;
    cursor: pointer;
}

#score, #highscore {
    position: absolute;
    left: 10px;
    color: white;
}

#score { top: 10px; font-size: 24px; }
#highscore { top: 40px; font-size: 16px; }
</style>
</head>

<body>

<div id="menu">
    <h1>Flappy GO ULTRA 😎🔥</h1>
    <input type="file" id="upload"><br><br>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>Game Over 💀</h1>
    <button onclick="restartGame()">Restart</button>
    <button onclick="quitGame()">Quit</button>
</div>

<div id="score">0</div>
<div id="highscore">Best: 0</div>

<canvas id="gameCanvas"></canvas>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let birdImg = new Image();

let bird = { x: 80, y: 200, w: 50, h: 50, velocity: 0 };

let gravity = 0.5;
let jump = -9;

let pipes = [];
let pipeGap, pipeWidth = 60, pipeSpeed, pipeDistance;

let score = 0;
let highScore = localStorage.getItem("flappyHigh") || 0;

let gameRunning = false;
let paused = false;

// 🔊 SOUND
let jumpSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
let hitSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// ☁️ CLOUDS
let clouds = [];
for(let i=0;i<3;i++){
    clouds.push({x: Math.random()*800, y: Math.random()*200});
}

// 📱💻 RESPONSIVE
function resizeCanvas(){
    if(window.innerWidth > 700){
        canvas.width = 900;
        canvas.height = 500;
    } else {
        canvas.width = 400;
        canvas.height = 600;
    }
}

function setGameMode(){
    if(canvas.width > canvas.height){
        pipeGap = 200;
        pipeSpeed = 3;
        pipeDistance = 400;
        bird.w = 60; bird.h = 60;
    } else {
        pipeGap = 150;
        pipeSpeed = 2;
        pipeDistance = 280;
        bird.w = 50; bird.h = 50;
    }
}

window.addEventListener("resize", ()=>{
    resizeCanvas();
    setGameMode();
});

// 📷 IMAGE UPLOAD
document.getElementById("upload").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = function(event){
        birdImg.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function startGame(){
    if(!birdImg.src){
        alert("Upload image first!");
        return;
    }

    resizeCanvas();
    setGameMode();

    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";

    document.getElementById("highscore").innerText = "Best: " + highScore;

    resetGame();
    gameRunning = true;
    paused = false;
    gameLoop();
}

function resetGame(){
    bird.x = canvas.width * 0.2;
    bird.y = canvas.height / 2;
    bird.velocity = 0;
    pipes = [];
    score = 0;
}

// 🟩 PIPE SPAWN (FIXED)
function spawnPipe(){
    let top = Math.random() * (canvas.height - pipeGap - 100) + 50;

    pipes.push({
        x: canvas.width,
        top: top,
        bottom: top + pipeGap,
        passed: false
    });
}

function update(){
    if(paused) return;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    // spawn by distance
    if(pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - pipeDistance){
        spawnPipe();
    }

    for(let i=pipes.length-1;i>=0;i--){
        let p = pipes[i];
        p.x -= pipeSpeed;

        if(!p.passed && p.x < bird.x){
            score++;
            p.passed = true;
        }

        if(p.x + pipeWidth < 0){
            pipes.splice(i,1);
        }

        if(
            bird.x < p.x + pipeWidth &&
            bird.x + bird.w > p.x &&
            (bird.y < p.top || bird.y + bird.h > p.bottom)
        ){
            gameOver();
        }
    }

    if(bird.y < 0 || bird.y + bird.h > canvas.height){
        gameOver();
    }

    // clouds move
    clouds.forEach(c=>{
        c.x -= 0.5;
        if(c.x < -50) c.x = canvas.width;
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ☁️ clouds
    ctx.fillStyle = "white";
    clouds.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x, c.y, 20, 0, Math.PI*2);
        ctx.fill();
    });

    // bird
    ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

    // pipes
    ctx.fillStyle = "green";
    pipes.forEach(p=>{
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        ctx.fillRect(p.x, p.bottom, pipeWidth, canvas.height);
    });

    document.getElementById("score").innerText = score;
}

function gameLoop(){
    if(!gameRunning) return;

    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver(){
    hitSound.play();
    gameRunning = false;

    if(score > highScore){
        localStorage.setItem("flappyHigh", score);
    }

    document.getElementById("gameOver").style.display = "block";
}

function restartGame(){
    document.getElementById("gameOver").style.display = "none";
    resetGame();
    gameRunning = true;
    gameLoop();
}

function quitGame(){
    location.reload();
}

// 🎮 CONTROLS
function jumpAction(){
    if(!paused){
        bird.velocity = jump;
        jumpSound.play();
    }
}

document.addEventListener("keydown", e=>{
    if(e.code === "Space") jumpAction();
    if(e.key === "p") paused = !paused;
});

document.addEventListener("click", jumpAction);
document.addEventListener("touchstart", jumpAction);

</script>

</body>
</html>
