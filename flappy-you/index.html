<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy You PRO 😎</title>
<style>
body {
    margin: 0;
    background: #70c5ce;
    font-family: Arial;
    text-align: center;
}
canvas {
    display: none;
    margin: auto;
    background: #70c5ce;
}
#menu, #gameOver {
    position: absolute;
    width: 100%;
    top: 40%;
    text-align: center;
}
button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 5px;
    cursor: pointer;
}
#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 24px;
    color: white;
}
</style>
</head>
<body>

<div id="menu">
    <h1>Flappy You 😎</h1>
    <input type="file" id="upload"><br><br>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>Game Over 💀</h1>
    <button onclick="restartGame()">Restart</button>
    <button onclick="quitGame()">Quit</button>
</div>

<div id="score">0</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let birdImg = new Image();
let bird = { x: 80, y: 200, w: 50, h: 50, velocity: 0 };

let gravity = 0.5;
let jump = -8;

let pipes = [];
let pipeGap = 160;
let pipeWidth = 60;
let pipeSpeed = 2;

let spawnTimer = 0;
let spawnInterval = 110;

let score = 0;
let gameRunning = false;

document.getElementById("upload").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = function(event){
        birdImg.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function startGame(){
    if(!birdImg.src){
        alert("Upload image first!");
        return;
    }

    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";

    resetGame();
    gameRunning = true;
    gameLoop();
}

function resetGame(){
    bird.y = 200;
    bird.velocity = 0;
    pipes = [];
    score = 0;
}

function spawnPipe(){
    let top = Math.random() * 200 + 50;
    pipes.push({
        x: canvas.width,
        top: top,
        bottom: top + pipeGap,
        passed: false
    });
}

function update(){
    // Bird physics
    bird.velocity += gravity;
    bird.y += bird.velocity;

    // Spawn pipes
    spawnTimer++;
    if(spawnTimer > spawnInterval){
        spawnPipe();
        spawnTimer = 0;
    }

    // Pipes movement
    for(let i = pipes.length - 1; i >= 0; i--){
        pipes[i].x -= pipeSpeed;

        // Score
        if(!pipes[i].passed && pipes[i].x < bird.x){
            score++;
            pipes[i].passed = true;
        }

        // Remove pipes
        if(pipes[i].x + pipeWidth < 0){
            pipes.splice(i, 1);
        }

        // Collision
        if(
            bird.x < pipes[i].x + pipeWidth &&
            bird.x + bird.w > pipes[i].x &&
            (bird.y < pipes[i].top || bird.y + bird.h > pipes[i].bottom)
        ){
            gameOver();
        }
    }

    // Ground / sky collision
    if(bird.y < 0 || bird.y + bird.h > canvas.height){
        gameOver();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Draw bird (fit image correctly)
    ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

    // Draw pipes
    ctx.fillStyle = "green";
    pipes.forEach(p => {
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        ctx.fillRect(p.x, p.bottom, pipeWidth, canvas.height);
    });

    document.getElementById("score").innerText = score;
}

function gameLoop(){
    if(!gameRunning) return;

    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver(){
    gameRunning = false;
    document.getElementById("gameOver").style.display = "block";
}

function restartGame(){
    document.getElementById("gameOver").style.display = "none";
    resetGame();
    gameRunning = true;
    gameLoop();
}

function quitGame(){
    location.reload();
}

// Controls (PC + Mobile)
document.addEventListener("keydown", e=>{
    if(e.code === "Space") bird.velocity = jump;
});

document.addEventListener("click", ()=>{
    bird.velocity = jump;
});

document.addEventListener("touchstart", ()=>{
    bird.velocity = jump;
});
</script>

</body>
</html>
