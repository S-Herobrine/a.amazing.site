<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy You PRO MAX</title>

<style>
body{
margin:0;
background:#1e1e2f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

/* GAME BOX (POKI STYLE) */
#gameBox{
width:900px;
height:500px;
background:#70c5ce;
border-radius:20px;
overflow:hidden;
position:relative;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

canvas{display:block}

/* UI */
#ui{
position:absolute;
top:10px;
left:15px;
color:white;
font-size:18px;
text-shadow:1px 1px 2px black;
}

#controls{
position:absolute;
top:10px;
right:10px;
}

button{
padding:6px 12px;
margin:3px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* SCREENS */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.5);
color:white;
z-index:5;
}

.hidden{display:none}
</style>
</head>

<body>

<div id="gameBox">

<div id="ui">Score: 0<br>Coins: 0<br>Best: 0</div>

<div id="controls">
<button onclick="pauseGame()">Pause</button>
<button onclick="restart()">Restart</button>
</div>

<div id="menu" class="screen">
<h1>FLAPPY YOU 😈</h1>
<button onclick="start()">Play</button>
<input type="file" id="upload">
</div>

<div id="over" class="screen hidden">
<h1>Game Over 💀</h1>
<button onclick="restart()">Restart</button>
<button onclick="showMenu()">Menu</button>
</div>

<canvas id="c"></canvas>

</div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let birdImg=new Image();

let bird,pipes,coinsArr;
let score=0,coins=0,best=localStorage.getItem("best")||0;

let gravity=0.5,lift=-10,gap=140,speed=3;
let running=false,paused=false;

let groundX=0;

// resize to box
function resize(){
c.width=900;
c.height=500;

bird={x:200,y:200,w:40,h:40,v:0};
pipes=[];
coinsArr=[];
score=0;
updateUI();
}

function updateUI(){
ui.innerHTML=
"Score: "+score+"<br>Coins: "+coins+"<br>Best: "+best;
}

// GAME CONTROL
function start(){
menu.classList.add("hidden");
over.classList.add("hidden");
resize();
running=true;
paused=false;
loop();
}

function restart(){start();}

function showMenu(){
running=false;
menu.classList.remove("hidden");
over.classList.add("hidden");
}

function gameOver(){
running=false;

if(score>best){
best=score;
localStorage.setItem("best",best);
}

over.classList.remove("hidden");
updateUI();
}

// BIRD
function updateBird(){
if(paused) return;

bird.v+=gravity;
bird.y+=bird.v;

if(bird.y<0) bird.y=0;
if(bird.y+bird.h>c.height-50) gameOver();
}

function drawBird(){
ctx.save();

// rotation
ctx.translate(bird.x+bird.w/2,bird.y+bird.h/2);
ctx.rotate(bird.v*0.05);

if(birdImg.src){
ctx.drawImage(birdImg,-bird.w/2,-bird.h/2,bird.w,bird.h);
}else{
ctx.fillStyle="yellow";
ctx.fillRect(-bird.w/2,-bird.h/2,bird.w,bird.h);
}

ctx.restore();
}

// PIPES
function spawnPipe(){
let top=Math.random()*250+50;

pipes.push({x:900,top:top,passed:false});
coinsArr.push({x:940,y:top+gap/2,collected:false});
}

function updatePipes(){
if(paused) return;

pipes.forEach((p,i)=>{
p.x-=speed;

if(!p.passed && p.x<bird.x){
score++;
p.passed=true;
updateUI();
}

if(
bird.x<p.x+80 &&
bird.x+bird.w>p.x &&
(bird.y<p.top || bird.y+bird.h>p.top+gap)
){
gameOver();
}

if(p.x<-100){
pipes.splice(i,1);
coinsArr.splice(i,1);
}
});
}

function drawPipes(){
ctx.fillStyle="green";

pipes.forEach(p=>{
ctx.fillRect(p.x,0,80,p.top);
ctx.fillRect(p.x,p.top+gap,80,c.height-(p.top+gap));

// caps
ctx.fillRect(p.x-5,p.top-20,90,20);
ctx.fillRect(p.x-5,p.top+gap,90,20);
});
}

// COINS
function updateCoins(){
if(paused) return;

coinsArr.forEach(cn=>{
cn.x-=speed;

if(!cn.collected &&
bird.x<cn.x+20 &&
bird.x+bird.w>cn.x &&
bird.y<cn.y+20 &&
bird.y+bird.h>cn.y
){
coins++;
cn.collected=true;
updateUI();
}
});
}

function drawCoins(){
ctx.fillStyle="gold";

coinsArr.forEach(cn=>{
if(!cn.collected){
ctx.beginPath();
ctx.arc(cn.x,cn.y,8,0,Math.PI*2);
ctx.fill();
}
});
}

// BACKGROUND
function drawBG(){
ctx.fillStyle="#70c5ce";
ctx.fillRect(0,0,c.width,c.height);

// ground scroll
groundX-=2;
ctx.fillStyle="#ded895";
ctx.fillRect(groundX,c.height-50,900,50);
ctx.fillRect(groundX+900,c.height-50,900,50);
}

// LOOP
function loop(){
if(!running) return;

ctx.clearRect(0,0,c.width,c.height);

drawBG();

updateBird();
drawBird();

if(pipes.length===0 || pipes[pipes.length-1].x<600){
spawnPipe();
}

updatePipes();
drawPipes();

updateCoins();
drawCoins();

requestAnimationFrame(loop);
}

// CONTROLS
function pauseGame(){paused=!paused;}

window.addEventListener("keydown",e=>{
if(e.code==="Space") bird.v=lift;
if(e.key==="p") pauseGame();
if(e.key==="r") restart();
});

window.addEventListener("click",()=>{
if(running && !paused) bird.v=lift;
});

upload.onchange=e=>{
birdImg.src=URL.createObjectURL(e.target.files[0]);
};

resize();
</script>

</body>
</html>
